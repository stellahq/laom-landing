name: Deploy staging

# Déploie automatiquement la branche `staging` sur https://staging.laom.fr
# Worker séparé (laom-staging) — n'affecte JAMAIS la prod laom.fr.
# La prod n'est déployée que par .github/workflows/deploy.yml (push sur main).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - staging
    paths-ignore:
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'ONBOARDING.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build (SITE_URL = staging)
        run: bun run build
        env:
          SITE_URL: https://staging.laom.fr
      # SEO check informatif sur staging (la config pointe sur laom.com,
      # donc on ne bloque pas le deploy staging dessus — le rapport reste lisible).
      - name: SEO check (non bloquant sur staging)
        run: bun run seo:check
        continue-on-error: true
      - name: Set Cloudflare Worker secrets (staging)
        run: |
          echo "$META_CAPI_TOKEN" | bunx wrangler@latest secret put META_CAPI_TOKEN -c wrangler.staging.jsonc
          echo "$CF_API_TOKEN_RUNTIME" | bunx wrangler@latest secret put CF_API_TOKEN -c wrangler.staging.jsonc
          echo "$CF_ACCOUNT_ID_RUNTIME" | bunx wrangler@latest secret put CF_ACCOUNT_ID -c wrangler.staging.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          META_CAPI_TOKEN: ${{ secrets.META_CAPI_TOKEN }}
          CF_API_TOKEN_RUNTIME: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID_RUNTIME: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Staging
        id: staging_deploy
        run: |
          set -e
          output=$(bunx wrangler@latest deploy -c wrangler.staging.jsonc)
          echo "$output"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Summary
        run: |
          echo "## 🧪 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** [https://staging.laom.fr](https://staging.laom.fr)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branche:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
