<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAOM Image Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Minimal Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo">LAOM</span>
        <span class="logo-sub">Image Manager</span>
      </div>
      <div class="header-right">
        <span id="current-page" class="current-page">/</span>
        <span id="git-status" class="git-status"></span>
      </div>
    </header>

    <!-- Fullscreen Site Iframe -->
    <main class="main-fullscreen">
      <iframe id="site-iframe" src="http://localhost:3000/"></iframe>
      <div id="iframe-loading" class="iframe-loading">
        <div class="spinner"></div>
        <p>Chargement du site...</p>
      </div>
    </main>

    <!-- Phototheque Modal (Squarespace-style) -->
    <div id="modal-phototheque" class="modal-fullscreen hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-container">
        <!-- Modal Header -->
        <div class="modal-header">
          <div class="modal-title">
            <h2 id="modal-title-text">Choisir une image</h2>
            <p id="modal-subtitle" class="modal-subtitle"></p>
          </div>
          <button id="btn-close-modal" class="btn-close" title="Fermer (Echap)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <!-- Current Image Preview -->
        <div id="current-image-section" class="current-image-section">
          <div class="current-image-label">Image actuelle</div>
          <div id="current-image-preview" class="current-image-preview">
            <!-- Filled dynamically -->
          </div>
        </div>

        <!-- Folder Tabs -->
        <div class="folder-tabs-container">
          <div id="folder-tabs" class="folder-tabs">
            <button class="folder-tab active" data-folder="all">Tous</button>
          </div>
        </div>

        <!-- Photos Grid -->
        <div class="photos-container">
          <div id="photos-grid" class="photos-grid">
            <p class="empty-state">Chargement...</p>
          </div>
        </div>

        <!-- Upload Zone -->
        <div class="upload-section">
          <div id="upload-zone" class="upload-zone">
            <input type="file" id="file-input" multiple accept="image/*" hidden>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>Glissez une image ou <label for="file-input" class="upload-link">parcourir</label></p>
          </div>
        </div>

        <!-- Modal Footer -->
        <div class="modal-footer">
          <button id="btn-cancel" class="btn btn-secondary">Annuler</button>
          <button id="btn-replace" class="btn btn-primary" disabled>Remplacer l'image</button>
        </div>
      </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Processing overlay -->
    <div id="processing-overlay" class="processing-overlay hidden">
      <div class="processing-content">
        <div class="spinner"></div>
        <p id="processing-message">Traitement en cours...</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
